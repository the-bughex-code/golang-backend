                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: TOKEN_MISSING or TOKEN_EXPIRED
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - profile
    patch:
      description: |-
        Changes the caller's own name. Email, roles and active status cannot be
