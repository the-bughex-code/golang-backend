                    type: string
                type: object
          description: Created
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: EMAIL_TAKEN
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: VALIDATION_FAILED
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: RATE_LIMITED
      summary: Register a new account
      tags:
      - auth
