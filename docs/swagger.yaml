  /api/v1/users/{id}:
    delete:
      description: |-
        Soft-deletes the account: the row survives so foreign keys still resolve,
        but it is invisible to every read, and the email becomes reusable.
        Requires the `users:delete` permission. You cannot delete yourself.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: CANNOT_DELETE_SELF or INVALID_ID
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: PERMISSION_DENIED
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: NOT_FOUND
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    get:
      description: Requires the `users:read` permission.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/data'
                properties:
                  data:
                    description: Data carries the payload on success, and is null
                      on failure.
                  errors:
                    description: |-
                      Errors carries per-field validation failures, and is null otherwise.
                      This is the only error detail ever echoed back verbatim.
                    items:
                      $ref: '#/components/schemas/apperrors.FieldError'
                    type: array
                    uniqueItems: false
                  message:
                    description: |-
                      Message is human-readable and safe to display. It is not stable; do not
                      branch on it.
                    type: string
                  meta:
                    additionalProperties: {}
                    description: |-
                      Meta is an escape hatch for endpoint-specific extras that do not deserve
                      a top-level field.
                    type: object
                  pagination:
                    $ref: '#/components/schemas/response.Pagination'
                  requestId:
                    description: |-
                      RequestID ties this response to the server logs. When a user reports a
                      bug, this string finds the exact request.
                    type: string
                  success:
                    description: |-
                      Success is the single field a client should branch on. It is redundant
                      with the HTTP status code on purpose: some proxies and SDKs swallow the
                      status, and a body that says success=false is impossible to misread.
                    type: boolean
                  timestamp:
                    description: |-
                      Timestamp is the server's UTC clock at the moment of the response. Useful
                      for diagnosing client clock skew, which breaks token expiry checks.
                    type: string
                type: object
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: INVALID_ID
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: PERMISSION_DENIED
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: NOT_FOUND
      security:
      - BearerAuth: []
      summary: Get a user by id
      tags:
      - users
  /api/v1/users/{id}/roles:
    post:
      description: |-
        Idempotent. Requires the `roles:assign` permission.
        The change takes effect for the target user on their next login or token refresh.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/request.AssignRole'
                description: Role name
                summary: body
        description: Role name
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: PERMISSION_DENIED
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: NOT_FOUND
