components:
  schemas:
    apperrors.FieldError:
      properties:
        field:
          type: string
        message:
          type: string
      type: object
    data:
      properties:
        data:
          items:
            $ref: '#/components/schemas/response.Role'
          type: array
      type: object
    pagination:
      properties:
        pagination:
          $ref: '#/components/schemas/response.Pagination'
      type: object
    request.AssignRole:
      properties:
        roleName:
          maxLength: 100
          minLength: 1
          type: string
      required:
      - roleName
      type: object
    request.ChangePassword:
      properties:
        currentPassword:
          description: |-
            Requiring the current password stops an attacker who has stolen an
            access token (say, from a logged XHR) from locking the real owner out.
          type: string
        newPassword:
          description: nefield ensures the new password actually differs from the
            old one.
          maxLength: 72
          minLength: 8
          type: string
      required:
      - currentPassword
      - newPassword
      type: object
    request.Login:
      properties:
        email:
          type: string
        password:
          description: |-
            No min= here. Rejecting a 3-character password at login with "must be at
            least 8 characters" tells an attacker the password was too short to be
            real, and annoys a legitimate user whose password predates the rule.
            Login either matches or it does not.
          type: string
      required:
      - email
      - password
      type: object
    request.Logout:
      properties:
        refreshToken:
          type: string
      required:
      - refreshToken
      type: object
    request.Refresh:
      properties:
        refreshToken:
          type: string
      required:
      - refreshToken
      type: object
    request.Register:
      properties:
        email:
          maxLength: 254
          type: string
        firstName:
          maxLength: 100
          minLength: 1
          type: string
        lastName:
          maxLength: 100
          minLength: 1
          type: string
        password:
          description: |-
            Password bounds, and why they are what they are:

              min=8  — NIST SP 800-63B sets 8 as the floor for user-chosen secrets.
              max=72 — bcrypt hashes at most 72 BYTES. Go's implementation returns
                       an error above that rather than silently truncating (some
                       other languages truncate, which means "correcthorse..." and
                       "correcthorse...extra" become the same password). Rejecting
                       it here produces a clear message instead of a 500.

            Deliberately absent: composition rules ("must contain an uppercase
            letter and a symbol"). NIST advises against them. They push users toward
            P@ssw0rd1 — predictable to a cracker, hard for a human — while adding
            no meaningful entropy. Length is what matters.
          maxLength: 72
          minLength: 8
          type: string
      required:
      - email
      - firstName
      - lastName
      - password
      type: object
    request.UpdateProfile:
      properties:
        firstName:
          maxLength: 100
          minLength: 1
          type: string
        lastName:
          maxLength: 100
          minLength: 1
          type: string
      required:
      - firstName
      - lastName
      type: object
    response.Auth:
      properties:
        accessToken:
          type: string
        expiresIn:
          description: |-
            ExpiresIn is the access token's lifetime in seconds. Clients should
            refresh slightly before this elapses, rather than waiting for a 401.
          type: integer
        refreshToken:
          description: |-
            RefreshToken is the ONLY time the raw token is ever transmitted. The
            server stores only its SHA-256 hash and can never show it again.
          type: string
        tokenType:
          description: |-
            TokenType is always "Bearer". Sent so the client can build the
            Authorization header without hardcoding the scheme.
          type: string
        user:
          $ref: '#/components/schemas/response.User'
      type: object
    response.Envelope:
      allOf:
      - $ref: '#/components/schemas/data'
      properties:
        data:
          description: Data carries the payload on success, and is null on failure.
        errors:
          description: |-
            Errors carries per-field validation failures, and is null otherwise.
            This is the only error detail ever echoed back verbatim.
          items:
            $ref: '#/components/schemas/apperrors.FieldError'
          type: array
          uniqueItems: false
        message:
          description: |-
            Message is human-readable and safe to display. It is not stable; do not
            branch on it.
          type: string
        meta:
          additionalProperties: {}
          description: |-
            Meta is an escape hatch for endpoint-specific extras that do not deserve
            a top-level field.
          type: object
        pagination:
          $ref: '#/components/schemas/response.Pagination'
        requestId:
          description: |-
            RequestID ties this response to the server logs. When a user reports a
            bug, this string finds the exact request.
          type: string
        success:
          description: |-
            Success is the single field a client should branch on. It is redundant
            with the HTTP status code on purpose: some proxies and SDKs swallow the
            status, and a body that says success=false is impossible to misread.
          type: boolean
        timestamp:
          description: |-
            Timestamp is the server's UTC clock at the moment of the response. Useful
            for diagnosing client clock skew, which breaks token expiry checks.
          type: string
      type: object
    response.Pagination:
      description: Pagination is present only on list endpoints.
      properties:
        hasNext:
          type: boolean
        hasPrev:
          type: boolean
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      type: object
    response.Permission:
      properties:
        description:
          type: string
        id:
          type: string
        name:
          type: string
      type: object
    response.Role:
      properties:
        description:
          type: string
        id:
          type: string
        name:
          type: string
        permissions:
          items:
            $ref: '#/components/schemas/response.Permission'
          type: array
          uniqueItems: false
      type: object
    response.User:
      properties:
        createdAt:
          type: string
        email:
          type: string
        emailVerifiedAt:
          type: string
        firstName:
          type: string
        fullName:
          type: string
        id:
          type: string
        isActive:
          type: boolean
        lastName:
          type: string
        roles:
          description: |-
            Roles is null when the caller did not request them, and an array
            otherwise. Never an empty array standing in for "not loaded".
          items:
            $ref: '#/components/schemas/response.Role'
          type: array
          uniqueItems: false
        updatedAt:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: 'Send the access token as: Bearer <token>'
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  contact:
    name: the-bughex-code
  description: |-
    A production-ready Go backend: JWT authentication, RBAC, and PostgreSQL.
    Every response uses the same envelope: success, message, data, errors,
    pagination, meta, timestamp, requestId.
  license:
    name: MIT
  title: Backend API
  version: "1.0"
openapi: 3.1.0
paths:
  /api/v1/auth/login:
    post:
      description: |-
        Returns an access token (short-lived, stateless) and a refresh token
        (long-lived, revocable). An unknown email and a wrong password return
        the identical error, in the same amount of time.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/request.Login'
                description: Credentials
                summary: body
        description: Credentials
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/data'
                properties:
                  data:
                    description: Data carries the payload on success, and is null
                      on failure.
                  errors:
                    description: |-
                      Errors carries per-field validation failures, and is null otherwise.
                      This is the only error detail ever echoed back verbatim.
                    items:
                      $ref: '#/components/schemas/apperrors.FieldError'
                    type: array
                    uniqueItems: false
                  message:
                    description: |-
                      Message is human-readable and safe to display. It is not stable; do not
                      branch on it.
                    type: string
                  meta:
                    additionalProperties: {}
                    description: |-
                      Meta is an escape hatch for endpoint-specific extras that do not deserve
                      a top-level field.
                    type: object
                  pagination:
                    $ref: '#/components/schemas/response.Pagination'
                  requestId:
                    description: |-
                      RequestID ties this response to the server logs. When a user reports a
                      bug, this string finds the exact request.
                    type: string
                  success:
                    description: |-
                      Success is the single field a client should branch on. It is redundant
                      with the HTTP status code on purpose: some proxies and SDKs swallow the
                      status, and a body that says success=false is impossible to misread.
                    type: boolean
                  timestamp:
                    description: |-
                      Timestamp is the server's UTC clock at the moment of the response. Useful
                      for diagnosing client clock skew, which breaks token expiry checks.
                    type: string
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: INVALID_CREDENTIALS
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: ACCOUNT_DISABLED
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: RATE_LIMITED
      summary: Sign in
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: |-
        Revokes one refresh token, ending that session. The access token remains
        valid until it expires; the client must discard it.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/request.Logout'
                description: Refresh token
                summary: body
        description: Refresh token
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.Envelope'
          description: OK
      summary: Sign out
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      description: |-
        Consumes the refresh token and issues a NEW one (rotation). Presenting an
        already-consumed token revokes every session for that user, because it
        means the token was copied.
        This endpoint is intentionally unauthenticated: the access token has expired.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/request.Refresh'
                description: Refresh token
                summary: body
        description: Refresh token
