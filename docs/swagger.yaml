basePath: /
definitions:
  apperrors.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  request.AssignRole:
    properties:
      roleName:
        example: admin
        maxLength: 100
        minLength: 1
        type: string
    required:
    - roleName
    type: object
  request.ChangePassword:
    properties:
      currentPassword:
        description: |-
          Requiring the current password stops an attacker who has stolen an
          access token (say, from a logged XHR) from locking the real owner out.
        example: correct-horse-battery
        type: string
      newPassword:
        description: nefield ensures the new password actually differs from the old
          one.
        example: a-different-strong-password
        maxLength: 72
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  request.Login:
    properties:
      email:
        example: alice@example.com
        type: string
      password:
        description: |-
          No min= here. Rejecting a 3-character password at login with "must be at
          least 8 characters" tells an attacker the password was too short to be
          real, and annoys a legitimate user whose password predates the rule.
          Login either matches or it does not.
        example: correct-horse-battery
        type: string
    required:
    - email
    - password
    type: object
  request.Logout:
    properties:
      refreshToken:
        example: paste-the-refreshToken-from-login
        type: string
    required:
    - refreshToken
    type: object
  request.Refresh:
    properties:
      refreshToken:
        example: paste-the-refreshToken-from-login
        type: string
    required:
    - refreshToken
    type: object
  request.Register:
    properties:
      email:
        example: alice@example.com
        maxLength: 254
        type: string
      firstName:
        example: Alice
        maxLength: 100
        minLength: 1
        type: string
      lastName:
        example: Nguyen
        maxLength: 100
        minLength: 1
        type: string
      password:
        description: |-
          Password bounds, and why they are what they are:

            min=8  — NIST SP 800-63B sets 8 as the floor for user-chosen secrets.
            max=72 — bcrypt hashes at most 72 BYTES. Go's implementation returns
                     an error above that rather than silently truncating (some
                     other languages truncate, which means "correcthorse..." and
                     "correcthorse...extra" become the same password). Rejecting
                     it here produces a clear message instead of a 500.

          Deliberately absent: composition rules ("must contain an uppercase
          letter and a symbol"). NIST advises against them. They push users toward
          P@ssw0rd1 — predictable to a cracker, hard for a human — while adding
          no meaningful entropy. Length is what matters.
        example: correct-horse-battery
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  request.ResendVerification:
    properties:
      email:
        example: alice@example.com
        type: string
    required:
    - email
    type: object
  request.UpdateProfile:
    properties:
      firstName:
        example: Alice
        maxLength: 100
        minLength: 1
        type: string
      lastName:
        example: Nguyen
        maxLength: 100
        minLength: 1
        type: string
    required:
    - firstName
    - lastName
    type: object
  request.VerifyEmail:
    properties:
      token:
        description: |-
          32 random bytes, base64url-unpadded, is always 43 characters. The bounds
          reject an obviously malformed value before it reaches the database, but
          they are not a security control: the token's 256 bits of entropy are.
        example: paste-the-token-from-the-verification-email
        maxLength: 64
        minLength: 40
        type: string
    required:
    - token
    type: object
  response.Auth:
    properties:
      accessToken:
        type: string
      expiresIn:
        description: |-
          ExpiresIn is the access token's lifetime in seconds. Clients should
          refresh slightly before this elapses, rather than waiting for a 401.
        type: integer
      refreshToken:
        description: |-
          RefreshToken is the ONLY time the raw token is ever transmitted. The
          server stores only its SHA-256 hash and can never show it again.
        type: string
      tokenType:
        description: |-
          TokenType is always "Bearer". Sent so the client can build the
          Authorization header without hardcoding the scheme.
        type: string
      user:
        $ref: '#/definitions/response.User'
    type: object
  response.Envelope:
    properties:
      data:
        description: Data carries the payload on success, and is null on failure.
      errors:
        description: |-
          Errors carries per-field validation failures, and is null otherwise.
          This is the only error detail ever echoed back verbatim.
        items:
          $ref: '#/definitions/apperrors.FieldError'
        type: array
      message:
        description: |-
          Message is human-readable and safe to display. It is not stable; do not
          branch on it.
        type: string
      meta:
        additionalProperties: {}
        description: |-
          Meta is an escape hatch for endpoint-specific extras that do not deserve
          a top-level field.
        type: object
      pagination:
        allOf:
        - $ref: '#/definitions/response.Pagination'
        description: Pagination is present only on list endpoints.
      requestId:
        description: |-
          RequestID ties this response to the server logs. When a user reports a
          bug, this string finds the exact request.
        type: string
      success:
        description: |-
          Success is the single field a client should branch on. It is redundant
          with the HTTP status code on purpose: some proxies and SDKs swallow the
          status, and a body that says success=false is impossible to misread.
        type: boolean
      timestamp:
        description: |-
          Timestamp is the server's UTC clock at the moment of the response. Useful
          for diagnosing client clock skew, which breaks token expiry checks.
        type: string
    type: object
  response.Pagination:
    properties:
      hasNext:
        type: boolean
      hasPrev:
        type: boolean
      page:
        type: integer
      perPage:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  response.Permission:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  response.Role:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/response.Permission'
        type: array
    type: object
  response.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      emailVerifiedAt:
        type: string
      firstName:
        type: string
      fullName:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      lastName:
        type: string
      roles:
        description: |-
          Roles is null when the caller did not request them, and an array
          otherwise. Never an empty array standing in for "not loaded".
        items:
          $ref: '#/definitions/response.Role'
        type: array
      updatedAt:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: the-bughex-code
  description: |-
    A production-ready Go backend: JWT authentication, RBAC, and PostgreSQL.
    Every response uses the same envelope: success, message, data, errors,
    pagination, meta, timestamp, requestId.
  license:
    name: MIT
  title: Backend API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Returns an access token (short-lived, stateless) and a refresh token
        (long-lived, revocable). An unknown email and a wrong password return
        the identical error, in the same amount of time.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.Auth'
              type: object
        "401":
          description: INVALID_CREDENTIALS
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: ACCOUNT_DISABLED
          schema:
            $ref: '#/definitions/response.Envelope'
        "429":
          description: RATE_LIMITED
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Sign in
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Revokes one refresh token, ending that session. The access token remains
        valid until it expires; the client must discard it.
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.Logout'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Sign out
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Consumes the refresh token and issues a NEW one (rotation). Presenting an
        already-consumed token revokes every session for that user, because it
        means the token was copied.
        This endpoint is intentionally unauthenticated: the access token has expired.
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.Refresh'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.Auth'
              type: object
        "401":
          description: REFRESH_TOKEN_INVALID, REFRESH_TOKEN_EXPIRED or REFRESH_TOKEN_REVOKED
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Refresh the access token
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a user, grants the default `user` role, and returns the account.
        The email is trimmed and lowercased before validation.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.Register'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.User'
              type: object
        "409":
          description: EMAIL_TAKEN
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: VALIDATION_FAILED
          schema:
            $ref: '#/definitions/response.Envelope'
        "429":
          description: RATE_LIMITED
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Register a new account
      tags:
      - auth
  /api/v1/auth/resend-verification:
    post:
      consumes:
      - application/json
      description: |-
        Always returns 200, whether or not the address has an account and
        whether or not it is already verified. Reporting the difference would
        let an attacker enumerate your users.
        Heavily rate limited, so it cannot be used as a mail cannon.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.ResendVerification'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: VALIDATION_FAILED
          schema:
            $ref: '#/definitions/response.Envelope'
        "429":
          description: RATE_LIMITED
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Resend the verification email
      tags:
      - auth
  /api/v1/auth/verify-email:
    post:
      consumes:
      - application/json
      description: |-
        Redeems the single-use token from the verification email.
        The token is consumed on success, so the link works exactly once.
        An unknown, expired and already-used token all return the same error,
        so a token guesser learns nothing from the response.
      parameters:
      - description: Verification token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.VerifyEmail'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.User'
              type: object
        "400":
          description: VERIFICATION_TOKEN_INVALID
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: VALIDATION_FAILED
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Verify an email address
      tags:
      - auth
  /api/v1/profile:
    get:
      description: Returns the caller's own account, with roles and permissions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.User'
              type: object
        "401":
          description: TOKEN_MISSING or TOKEN_EXPIRED
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - profile
    patch:
      consumes:
      - application/json
      description: |-
        Changes the caller's own name. Email, roles and active status cannot be
        changed here; those fields do not exist on the request type.
      parameters:
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UpdateProfile'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.User'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: VALIDATION_FAILED
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Update my profile
      tags:
      - profile
  /api/v1/profile/change-password:
    post:
      consumes:
      - application/json
      description: |-
        Requires the current password. On success, EVERY refresh token for this
        user is revoked, including the caller's own, so all devices must sign in again.
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.ChangePassword'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: CURRENT_PASSWORD_INCORRECT
          schema:
            $ref: '#/definitions/response.Envelope'
        "422":
          description: VALIDATION_FAILED
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Change my password
      tags:
      - profile
  /api/v1/roles:
    get:
      description: Requires the `roles:read` permission.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/response.Role'
                  type: array
              type: object
        "403":
          description: PERMISSION_DENIED
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all roles
      tags:
      - roles
  /api/v1/users:
    get:
      description: Offset-paginated. Requires the `users:read` permission.
      parameters:
      - default: 1
        description: Page number, 1-based
        in: query
        name: page
        type: integer
      - default: 20
        description: Rows per page, max 100
        in: query
        name: perPage
        type: integer
      - description: Match against email, first or last name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/response.User'
                  type: array
                pagination:
                  $ref: '#/definitions/response.Pagination'
              type: object
        "403":
          description: PERMISSION_DENIED
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: |-
        Soft-deletes the account: the row survives so foreign keys still resolve,
        but it is invisible to every read, and the email becomes reusable.
        Requires the `users:delete` permission. You cannot delete yourself.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "400":
          description: CANNOT_DELETE_SELF or INVALID_ID
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: PERMISSION_DENIED
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    get:
      description: Requires the `users:read` permission.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/response.User'
              type: object
        "400":
          description: INVALID_ID
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: PERMISSION_DENIED
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get a user by id
      tags:
      - users
  /api/v1/users/{id}/roles:
    post:
      consumes:
      - application/json
      description: |-
        Idempotent. Requires the `roles:assign` permission.
        The change takes effect for the target user on their next login or token refresh.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: Role name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.AssignRole'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: PERMISSION_DENIED
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Assign a role to a user
      tags:
      - roles
  /health/live:
    get:
      description: |-
        Answers "is the process running?". Touches nothing external, deliberately:
        a liveness probe that checks the database turns a database outage into a
        container restart loop.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Liveness probe
      tags:
      - health
  /health/ready:
    get:
      description: |-
        Answers "can this process serve a request?". Pings the database. A failure
        should remove the instance from the load balancer, not restart it.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "503":
          description: DATABASE_UNAVAILABLE
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: Readiness probe
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: 'Send the access token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
